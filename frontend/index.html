<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임대인 앱 가이드 | Landlord App Documentation</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L43FEM97NS"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-L43FEM97NS');
    </script>
    <meta name="description" content="임대인 앱을 효율적으로 사용하기 위한 상세 가이드 및 메뉴 설명서입니다.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-container">
                <div class="logo">
                    <span class="logo-icon">🏠</span>
                    <span class="logo-text">sugar <span>members guide</span></span>
                </div>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="도움말 검색...">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="auth-section" id="auth-section">
                    <button id="login-btn" class="btn btn-outline">로그인</button>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="role-selector" style="margin-bottom: 1.5rem;">
                    <select id="role-select"
                        style="width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border-color); background: #f8fafc; font-family: inherit; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: border-color 0.2s;">
                        <option value="landlord">임대인 가이드</option>
                        <option value="tenant">세입자 가이드</option>
                        <option value="developer">개발자 일기</option>
                        <option value="partner">파트너 매뉴얼</option>
                    </select>
                </div>
                <div class="sidebar-actions" id="sidebar-actions" style="gap: 0.5rem; flex-direction: column;">
                    <button id="add-page-btn" class="btn btn-primary" style="width: 100%; font-size: 0.85rem;">➕ 새 페이지
                        추가</button>
                    <button id="add-cat-btn" class="btn btn-outline" style="width: 100%; font-size: 0.85rem;">📂 새 카테고리
                        추가</button>
                </div>
                <nav class="nav-tree" id="nav-tree">
                    <!-- Menu tree will be injected here -->
                </nav>
                <div id="sidebar-controls" class="sidebar-controls"
                    style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color); display: none;">
                    <button id="edit-menu-btn" class="btn btn-outline"
                        style="width: 100%; font-size: 0.8rem; margin-bottom: 0.5rem;">⚙️ 메뉴 관리</button>
                    <button id="media-library-btn" class="btn btn-outline" style="width: 100%; font-size: 0.8rem;">🖼️
                        미디어 관리</button>
                </div>
            </aside>

            <!-- Content -->
            <main class="content-area">
                <nav class="breadcrumbs" id="breadcrumbs">
                    <a href="#">가이드</a> / <span id="current-breadcrumb">시작하기</span>
                </nav>
                <article class="doc-content" id="doc-content">
                    <div class="edit-controls" id="edit-controls">
                        <button id="edit-btn" class="btn btn-outline">✏️ 수정하기</button>
                    </div>
                    <div class="doc-content-wrapper" id="content-wrapper">
                        <div id="doc-content-display" class="doc-content-display">
                            <!-- Content will be injected here -->
                        </div>
                        <div id="editor-container" class="editor-container">
                            <textarea id="content-editor" placeholder="마크다운 형식을 입력하세요..."></textarea>
                            <div id="editor-preview" class="editor-preview"
                                style="display: none; padding: 1.5rem; border: 1px solid var(--border-color); border-radius: 8px; background: #fff; margin-bottom: 1rem; min-height: 400px;">
                            </div>
                            <div class="editor-actions">
                                <button id="preview-toggle" class="btn btn-outline"
                                    style="margin-right: auto;">미리보기</button>
                                <button id="cancel-edit" class="btn btn-ghost">취소</button>
                                <button id="save-content" class="btn btn-primary">저장하기</button>
                            </div>
                        </div>
                    </div>
                </article>
                <footer class="doc-footer">
                    <div class="feedback">
                        <p>이 문서가 도움이 되었나요?</p>
                        <div class="feedback-btns">
                            <button class="btn-icon">👍</button>
                            <button class="btn-icon">👎</button>
                        </div>
                    </div>
                </footer>
            </main>

            <!-- Table of Contents (Right side) -->
            <aside class="toc">
                <div class="toc-container">
                    <h3>목차</h3>
                    <ul id="toc-list">
                        <!-- TOC will be injected here -->
                    </ul>
                </div>
            </aside>
        </div>
    </div>

    <!-- Login Modal (Overlay) -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2>로그인</h2>
            <p>가이드를 더 편리하게 보시려면 로그인하세요.</p>
            <div class="form-group">
                <label>아이디</label>
                <input type="text" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" placeholder="********">
            </div>
            <div class="modal-actions">
                <button id="close-modal" class="btn btn-ghost">취소</button>
                <button id="confirm-login" class="btn btn-primary">확인</button>
            </div>
        </div>
    </div>

    <!-- Menu Edit Modal -->
    <div id="menu-modal" class="modal">
        <div class="modal-content" style="width: 600px;">
            <h2>메뉴 구조 관리</h2>
            <p>JSON 형식으로 메뉴 구조를 편집할 수 있습니다. (id는 guideData의 키와 일치해야 합니다)</p>
            <div class="form-group">
                <textarea id="menu-json-editor"
                    style="width: 100%; height: 300px; font-family: monospace; font-size: 0.85rem; padding: 1rem; border: 1px solid var(--border-color); border-radius: 8px;"></textarea>
            </div>
            <div class="modal-actions">
                <button id="close-menu-modal" class="btn btn-ghost">취소</button>
                <button id="save-menu" class="btn btn-primary">변경사항 저장</button>
            </div>
        </div>
    </div>

    <!-- Media Library Modal -->
    <div id="media-modal" class="modal">
        <div class="modal-content" style="width: 800px; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>미디어 라이브러리</h2>
                <button id="close-media-modal" class="btn btn-ghost">닫기</button>
            </div>

            <div
                style="margin-bottom: 1.5rem; padding: 1.25rem; background: #f8fafc; border-radius: 12px; border: 1px dashed #cbd5e1;">
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="new-media-url" placeholder="이미지 URL 입력을 통한 추가..."
                            style="flex: 1; padding: 0.6rem; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.85rem;">
                        <button id="add-media-btn" class="btn btn-primary">URL 추가</button>
                    </div>
                    <div
                        style="display: flex; align-items: center; gap: 1rem; padding-top: 1rem; border-top: 1px solid #e2e8f0;">
                        <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">또는 파일 업로드:</span>
                        <input type="file" id="media-file-input" accept="image/*" style="display: none;">
                        <button id="upload-trigger-btn" class="btn btn-outline"
                            style="font-size: 0.8rem; padding: 0.5rem 1rem;">📁 파일 선택 및 업로드</button>
                        <span id="upload-status" style="font-size: 0.75rem; color: var(--primary);"></span>
                    </div>
                </div>
            </div>

            <div id="media-grid"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem;">
                <!-- Media items will be injected here -->
            </div>
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>

</html>
